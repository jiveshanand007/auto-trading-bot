services:
  postgres:
    image: postgres:16
    container_name: trading_bot_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: trading_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d trading_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
